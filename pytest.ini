[pytest]
# 测试都放 tests/ 目录
testpaths = tests
# 让 tests/ 里的测试能直接 import 上级目录的 agent / tools（把 myagent 根目录加进 sys.path）
pythonpath = .
# 注册自定义 marker，避免 pytest 报 unknown marker 警告
markers =
    e2e: 端到端测试，会真调 Anthropic API（烧少量 token）。跑 `-m "not e2e"` 可跳过。
# 只把 test_*.py 当测试文件（00_smoke_test.py / 01_run_agent.py 是手动脚本，不收集）
python_files = test_*.py
